services:
  - type: web
    name: expense-tracker-api
    runtime: node
    plan: free
    buildCommand: "npm install && npx prisma generate --schema=./prisma/schema.prisma && npm run build && npx prisma migrate deploy --schema=./prisma/schema.prisma"
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --dns-result-order=ipv4first
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false          # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false          # Set manually in Render dashboard
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: SMTP_HOST
        value: smtp-relay.brevo.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false          # Set manually in Render dashboard
      - key: SMTP_PASS
        sync: false          # Set manually in Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false          # e.g. https://yourapp.com — leave empty to allow all  
      - key: GOOGLE_CLIENT_ID
        sync: false       
      - key: GOOGLE_CLIENT_SECRET
        sync: false        
      - key: GOOGLE_REFRESH_TOKEN
        sync: false         