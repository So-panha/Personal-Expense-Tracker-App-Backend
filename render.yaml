services:
  - type: web
    name: expense-tracker-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false          # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false          # Set manually in Render dashboard
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false          # Set manually in Render dashboard
      - key: SMTP_PASS
        sync: false          # Set manually in Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false          # e.g. https://yourapp.com — leave empty to allow all
